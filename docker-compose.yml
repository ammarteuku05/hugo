services:
  backend:
    build:
      context: ./glenigan_backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./glenigan_backend/glenigan_takehome_FS.db:/app/glenigan_takehome_FS.db
    environment:
      - DATABASE_PATH=/app/glenigan_takehome_FS.db
      - PORT=8000
    restart: unless-stopped

  frontend:
    build:
      context: ./glenigan_frontend
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    environment:
      - BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

# Project-wide settings
